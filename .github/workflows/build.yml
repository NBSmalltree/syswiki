name: Build and Package

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Build and test backend
        run: |
          cd syswiki-backend
          mvn package -DskipTests=false
        env:
          JWT_SECRET: ci-build-secret-key-for-testing-only
          AI_BASE_URL: https://api.openai.com/v1
          AI_API_KEY: ci-build-placeholder-key

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: syswiki-backend/target/*.jar
          retention-days: 7

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: syswiki-frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd syswiki-frontend
          npm ci

      - name: Build frontend
        run: |
          cd syswiki-frontend
          npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: syswiki-frontend/dist/
          retention-days: 7

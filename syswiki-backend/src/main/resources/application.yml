server:
  port: 8080
  servlet:
    context-path: /syswiki

spring:
  application:
    name: syswiki-backend
  profiles:
    active: dev
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: none

syswiki:
  jwt:
    secret: ${JWT_SECRET}
    expiration: 14400000  # 4小时
    refresh-expiration: 2592000000  # 30天
  auth:
    rate-limit:
      max-attempts: ${AUTH_RATE_LIMIT_MAX_ATTEMPTS:5}
      lock-minutes: ${AUTH_RATE_LIMIT_LOCK_MINUTES:15}
  ai:
    base-url: ${AI_BASE_URL}
    api-key: ${AI_API_KEY}
    flash-model: ${AI_FLASH_MODEL:mimo-v2.5-pro}
    think-model: ${AI_THINK_MODEL:mimo-v2.5-pro}
    embedding-model: ${EMBEDDING_MODEL:text-embedding-3-small}
    embedding-base-url: ${EMBEDDING_BASE_URL:${AI_BASE_URL}}
    embedding-api-key: ${EMBEDDING_API_KEY:${AI_API_KEY}}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  async:
    core-pool-size: ${ASYNC_CORE_POOL_SIZE:2}
    max-pool-size: ${ASYNC_MAX_POOL_SIZE:4}
    queue-capacity: ${ASYNC_QUEUE_CAPACITY:100}
    retry-max-attempts: ${ASYNC_RETRY_MAX_ATTEMPTS:3}
    retry-initial-backoff: ${ASYNC_RETRY_INITIAL_BACKOFF:1000}
    retry-multiplier: ${ASYNC_RETRY_MULTIPLIER:2.0}
    retry-max-backoff: ${ASYNC_RETRY_MAX_BACKOFF:10000}
